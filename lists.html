<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <a href="index.html">Go to index.html</a>
    <ul> <!--unordered list, creates a bulleted list-->
               <li> Item 1 </li><!--list item-->
               <li> Item 2 </li><!--list item-->
               <li> Item 3 </li><!--list item-->
           </ul >
              <ol type="1"> <!--ordered list, creates a numbered list-->
                <!--default numbering style (1, 2, 3)-->
                <li> Item 1 </li><!--list item-->
                <li> Item 2 </li><!--list item-->
                <li> Item 3 </li><!--list item-->   
                </ol>
                
            <dl> <!--definition list, used for terms and their definitions-->
                <dt> Term 1 </dt><!--definition term-->
                <dd> Definition of term 1 </dd><!--definition description-->
                <dt> Term 2 </dt><!--definition term-->
                <dd> Definition of term 2</dd><!--definition description-->
            </dl>
</body>
</html>
